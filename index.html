<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Platformer - Final Emoji Stage</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100vw;
            margin: 0;
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            border: 4px solid #fff;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #000;
            box-sizing: border-box;
            
            max-width: 100vw;
            max-height: 100dvh;
            width: auto;
            height: auto;
            aspect-ratio: 16 / 9;
            object-fit: contain;
            
            touch-action: none;
        }
        .instructions {
            margin-top: 15px;
            text-align: center;
            line-height: 1.5;
            padding: 0 10px;
        }
        kbd {
            background-color: #444;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #777;
        }

        .controls {
            display: none;
            position: absolute;
            bottom: 30px;
            width: 100%;
            max-width: 800px;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
        }
        .control-group {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        .btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: transform 0.1s, background 0.1s;
        }
        .btn.active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }

        @media (max-width: 850px) {
            .controls { display: flex; }
            .instructions { display: none; }
        }

        @media (max-height: 500px) {
            .controls {
                bottom: 10px;
                padding: 0 40px;
            }
            .btn {
                width: 50px;
                height: 50px;
                font-size: 24px;
                background: rgba(255, 255, 255, 0.15);
            }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div class="instructions">
        移動: <kbd>←</kbd> <kbd>→</kbd> / ジャンプ: <kbd>Space</kbd> / 土管に入る: <kbd>↓</kbd><br>
        巨大化中はジャンプ力アップ！過酷なアスレチックと敵の群れを越え、ゴール(X:10000)を目指せ！
    </div>

    <div class="controls" id="virtualPad">
        <div class="control-group">
            <div class="btn" id="btnLeft">⬅️</div>
            <div class="btn" id="btnRight">➡️</div>
            <div class="btn" id="btnDown">⬇️</div>
        </div>
        <div class="control-group">
            <div class="btn" id="btnJump">⬆️</div>
        </div>
    </div>

<script>
    // ==========================================
    // Web Audio API サウンド管理
    // ==========================================
    class SoundManager {
        constructor() {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.isPlayingBGM = false;
            this.bgmInterval = null;
            this.unlocked = false;
        }

        playSE(type) {
            if (this.ctx.state === 'suspended') return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            const t = this.ctx.currentTime;

            switch(type) {
                case 'jump':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, t);
                    osc.frequency.exponentialRampToValueAtTime(300, t + 0.1);
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                    osc.start(t);
                    osc.stop(t + 0.1);
                    break;
                case 'coin':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, t);
                    osc.frequency.setValueAtTime(1200, t + 0.05);
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                    osc.start(t);
                    osc.stop(t + 0.1);
                    break;
                case 'giant':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(200, t);
                    osc.frequency.linearRampToValueAtTime(400, t + 0.3);
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.linearRampToValueAtTime(0.001, t + 0.3);
                    osc.start(t);
                    osc.stop(t + 0.3);
                    break;
                case 'pipe':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(100, t);
                    osc.frequency.linearRampToValueAtTime(50, t + 0.4);
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.linearRampToValueAtTime(0.001, t + 0.4);
                    osc.start(t);
                    osc.stop(t + 0.4);
                    break;
                case 'damage':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, t);
                    osc.frequency.exponentialRampToValueAtTime(50, t + 0.2);
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                    osc.start(t);
                    osc.stop(t + 0.2);
                    break;
                case 'goal':
                    const notes = [
                        { f: 523.25, d: 0 }, { f: 659.25, d: 0.15 }, { f: 783.99, d: 0.3 }, { f: 1046.50, d: 0.45 },
                        { f: 783.99, d: 0.6 }, { f: 1046.50, d: 0.75 }, { f: 1318.51, d: 1.0 }
                    ];
                    notes.forEach(note => {
                        const o = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        o.type = 'square';
                        o.connect(g);
                        g.connect(this.ctx.destination);
                        o.frequency.setValueAtTime(note.f, t + note.d);
                        g.gain.setValueAtTime(0.05, t + note.d);
                        g.gain.exponentialRampToValueAtTime(0.001, t + note.d + 0.3);
                        o.start(t + note.d);
                        o.stop(t + note.d + 0.4);
                    });
                    break;
            }
        }

        startBGM(type = 'overworld') {
            if (this.isPlayingBGM) this.stopBGM();
            this.isPlayingBGM = true;
            let noteIdx = 0;
            let notes = [];
            let interval = 250;

            if (type === 'overworld') {
                notes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63]; // C, E, G, C, G, E
                interval = 150;
            } else if (type === 'underground') {
                notes = [146.83, 155.56, 174.61, 155.56]; // D3, Eb3, F3, Eb3
                interval = 400;
            }
            
            this.bgmInterval = setInterval(() => {
                if (this.ctx.state === 'suspended') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = (type === 'overworld') ? 'square' : 'triangle';
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                const t = this.ctx.currentTime;
                osc.frequency.setValueAtTime(notes[noteIdx % notes.length], t);
                gain.gain.setValueAtTime((type === 'overworld') ? 0.02 : 0.04, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + (interval / 1000) * 0.8);
                osc.start(t);
                osc.stop(t + (interval / 1000) * 0.8);
                noteIdx++;
            }, interval);
        }

        stopBGM() {
            this.isPlayingBGM = false;
            clearInterval(this.bgmInterval);
        }
    }

    const sound = new SoundManager();

    // ==========================================
    // グローバルな Audio Unlock 処理
    // ユーザーの直接的なアクションの同一コールバック内で完結させる
    // ==========================================
    const unlockAudio = () => {
        if (sound.unlocked) return;
        
        if (sound.ctx.state === 'suspended') {
            sound.ctx.resume();
        }

        // ブラウザの最適化（無音無視）を突破するため、極小の可聴音を一瞬だけ再生する
        const osc = sound.ctx.createOscillator();
        const gain = sound.ctx.createGain();
        osc.connect(gain);
        gain.connect(sound.ctx.destination);
        gain
